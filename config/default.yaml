{
  "api_model": "anthropic/claude-sonnet-4-5",
  "ai_backend": "api",
  "cli_tool": "claude",
  "cli_model": null,
  "providers": {
    "openrouter": {
      "default_model": "anthropic/claude-sonnet-4-5",
      "api_key_env": "OPENROUTER_API_KEY"
    },
    "openai": {
      "default_model": "gpt-4o",
      "api_key_env": "OPENAI_API_KEY"
    },
    "anthropic": {
      "default_model": "claude-sonnet-4-5",
      "api_key_env": "ANTHROPIC_API_KEY"
    },
    "cli": {
      "default_tool": "codex",
      "available_tools": ["codex", "claude", "aider"]
    }
  },
  "slicing": {
    "max_tokens_per_slice": 8000,
    "security_priority": ["auth", "security", "api", "database", "middleware", "core", "services", "config", "utils", "views"],
    "languages_supported": ["py", "js", "ts", "go", "rs", "rb", "java", "cs", "php", "swift", "kt", "scala", "rs", "c", "cpp", "h", "hpp", "vue", "svelte", "jsx", "tsx"]
  }
}
